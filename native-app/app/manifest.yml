manifest_version: 2

artifacts:
  setup_script: setup_script.sql
  container_services:
    images:
      - /SALES_DEMO_PKG/app_src/img_repo/deals_streamlit:latest

default_web_endpoint:
  service: core.deals_service
  endpoint: ui

privileges:
  - BIND SERVICE ENDPOINT:
      description: Required to expose the Streamlit UI as a public web endpoint.

restricted_callers_rights:
  enabled: true

configuration:
  log_level: INFO
  trace_level: ALWAYS
